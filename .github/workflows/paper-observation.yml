name: Paper Observation No-Orders

on:
  schedule:
    # Runs after the regular US market close window, Tuesday-Saturday UTC.
    # 02:30 UTC = 11:30 KST, giving data vendors time to publish prior US session bars.
    - cron: "30 2 * * 2-6"
  workflow_dispatch:

permissions:
  contents: write
  issues: write

defaults:
  run:
    shell: bash

concurrency:
  group: paper-observation-no-orders
  cancel-in-progress: false

jobs:
  observe:
    name: Append paper observation only
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      PYTHON_VERSION: "3.11"
      STRATEGY_NAME: "AAPL_0.3_GLD_0.7"
      STRATEGY_WEIGHTS: "AAPL=0.3 GLD=0.7"
      STATE_BRANCH: "paper-observation-state"
      ALPHA_VANTAGE_API_KEY: ${{ secrets.ALPHA_VANTAGE_API_KEY }}
      FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
      FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
      NEWSAPI_KEY: ${{ secrets.NEWSAPI_KEY }}
    steps:
      - name: Check out research repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Restore prior observation log from state branch
        run: |
          set -euo pipefail
          mkdir -p reports .omx/reports
          git fetch origin "${STATE_BRANCH}:${STATE_BRANCH}" || true
          if git show-ref --verify --quiet "refs/heads/${STATE_BRANCH}"; then
            git show "${STATE_BRANCH}:reports/paper-observation-log.jsonl" \
              > reports/paper-observation-log.jsonl || true
            git show "${STATE_BRANCH}:reports/paper-challenger-observation-log.jsonl" \
              > reports/paper-challenger-observation-log.jsonl || true
            git show "${STATE_BRANCH}:reports/paper-trade-intent-log.jsonl" \
              > reports/paper-trade-intent-log.jsonl || true
          fi
          git fetch origin intraday-no-order-state:intraday-no-order-state || true
          if git show-ref --verify --quiet refs/heads/intraday-no-order-state; then
            git show intraday-no-order-state:reports/intraday-no-order-log.jsonl \
              > reports/intraday-no-order-log.jsonl || true
          fi

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install uv
        run: python -m pip install --upgrade uv

      - name: Validate code before observation
        run: |
          set -euo pipefail
          uv run --with pytest python -m pytest -q
          uv run --with ruff ruff check .
          uv run --with mypy mypy

      - name: Refresh offline research gates
        run: |
          set -euo pipefail
          uv run python scripts/fundamental_macro_recent_gate.py --top-candidates 8
          uv run python scripts/sec_fundamental_feature_snapshot.py
          uv run python scripts/bls_macro_snapshot.py
          uv run python scripts/build_us_liquid_universe.py \
            --max-rank-candidates 300 \
            --max-output-symbols 150 \
            --min-history-rows 1100 \
            --min-selected-symbols 10
          uv run python scripts/market_universe_candidate_scan.py \
            --symbols-file data/universe/us_dynamic_liquid_watchlist.txt \
            --top-candidates 30
          uv run python scripts/adaptive_allocation_search.py || true

      - name: Generate dry-run target weights with no orders
        run: |
          set -euo pipefail
          # shellcheck disable=SC2086
          uv run python scripts/paper_signal_dry_run.py \
            --strategy "${STRATEGY_NAME}" \
            --weights ${STRATEGY_WEIGHTS}
          uv run python scripts/paper_challenger_signal.py

      - name: Append paper observation log
        run: |
          set -euo pipefail
          uv run python scripts/paper_observation_log.py
          if [[ -f reports/paper-challenger-signal-latest.json ]]; then
            uv run python scripts/paper_observation_log.py \
              --signal reports/paper-challenger-signal-latest.json \
              --log reports/paper-challenger-observation-log.jsonl \
              --summary .omx/reports/paper-challenger-observation-summary-latest.json \
              --markdown .omx/reports/paper-challenger-observation-summary-latest.md
          else
            uv run python - <<'PY'
          import json
          from datetime import UTC, datetime
          from pathlib import Path

          summary = {
              "status": "blocked",
              "observed_days": 0,
              "required_days": 30,
              "latest_as_of_date": None,
              "latest_strategy": None,
              "latest_virtual_equity": None,
              "total_return_since_first_observation": None,
              "max_drawdown_since_first_observation": None,
              "generated_at": datetime.now(tz=UTC).isoformat(),
              "blockers": ["market_scan_has_no_safe_passed_challenger"],
              "safety": "challenger observation blocked; no orders; no trading venue; no advice",
          }
          out = Path(".omx/reports/paper-challenger-observation-summary-latest.json")
          out.parent.mkdir(parents=True, exist_ok=True)
          out.write_text(json.dumps(summary, indent=2), encoding="utf-8")
          Path(".omx/reports/paper-challenger-observation-summary-latest.md").write_text(
              "# Paper challenger observation\n\n"
              "Status: blocked\n\n"
              "- market_scan_has_no_safe_passed_challenger\n",
              encoding="utf-8",
          )
          PY
          fi
          uv run python scripts/paper_trade_intent_log.py
          uv run python scripts/no_order_preview_report.py
          uv run python scripts/operational_risk_gate.py
          uv run python scripts/independent_price_replication_gate.py
          uv run python scripts/live_readiness_gate.py
          uv run python scripts/broker_execution_preflight_report.py

      - name: Summarize no-order gate status
        id: gate_status
        run: |
          set -euo pipefail
          uv run python scripts/no_order_gate_status.py --github-output "${GITHUB_OUTPUT}"

      - name: Render Discord paper report artifact
        run: |
          set -euo pipefail
          uv run python scripts/discord_paper_report.py --dry-run

      - name: Upload observation artifacts
        uses: actions/upload-artifact@v4
        with:
          name: paper-observation-${{ github.run_id }}
          retention-days: 1
          path: |
            reports/paper-dry-run-signal-latest.json
            reports/paper-challenger-signal-latest.json
            reports/paper-observation-log.jsonl
            reports/paper-challenger-observation-log.jsonl
            reports/paper-trade-intent-log.jsonl
            reports/intraday-no-order-log.jsonl
            .omx/reports/fundamental-macro-recent-gate-latest.json
            .omx/reports/fundamental-macro-recent-gate-latest.md
            .omx/features/sec-fundamental-snapshot.csv
            .omx/reports/sec-fundamental-feature-snapshot-latest.json
            .omx/reports/sec-fundamental-feature-snapshot-latest.md
            .omx/reports/bls-macro-snapshot-latest.json
            .omx/reports/bls-macro-snapshot-latest.md
            data/universe/us_dynamic_liquid_watchlist.txt
            .omx/reports/us-dynamic-liquid-universe-latest.json
            .omx/reports/us-dynamic-liquid-universe-latest.md
            .omx/reports/market-universe-scan-latest.json
            .omx/reports/market-universe-scan-latest.md
            .omx/reports/adaptive-allocation-search-latest.json
            .omx/reports/adaptive-allocation-search-latest.md
            .omx/reports/paper-observation-summary-latest.json
            .omx/reports/paper-observation-summary-latest.md
            .omx/reports/paper-challenger-observation-summary-latest.json
            .omx/reports/paper-challenger-observation-summary-latest.md
            .omx/reports/no-order-preview-latest.json
            .omx/reports/no-order-preview-latest.md
            .omx/reports/paper-challenger-selection-latest.json
            .omx/reports/paper-challenger-selection-latest.md
            .omx/reports/operational-risk-gate-latest.json
            .omx/reports/operational-risk-gate-latest.md
            .omx/reports/independent-price-replication-latest.json
            .omx/reports/independent-price-replication-latest.md
            .omx/reports/live-readiness-gate-latest.json
            .omx/reports/live-readiness-gate-latest.md
            .omx/reports/broker-execution-preflight-latest.json
            .omx/reports/broker-execution-preflight-latest.md
            .omx/reports/no-order-gate-status-latest.json
            .omx/reports/no-order-gate-status-latest.md
            .omx/reports/discord-paper-report-latest.json
            .omx/reports/discord-paper-report-latest.md

      - name: Persist latest observation state branch
        run: |
          set -euo pipefail
          tmp_state="$(mktemp -d)"
          mkdir -p "${tmp_state}/reports" "${tmp_state}/.omx/reports" "${tmp_state}/data/universe"
          cp -f reports/paper-dry-run-signal-latest.json "${tmp_state}/reports/"
          cp -f reports/paper-challenger-signal-latest.json "${tmp_state}/reports/" || true
          cp -f reports/paper-observation-log.jsonl "${tmp_state}/reports/"
          cp -f reports/paper-challenger-observation-log.jsonl "${tmp_state}/reports/" || true
          cp -f reports/paper-trade-intent-log.jsonl "${tmp_state}/reports/"
          mkdir -p "${tmp_state}/.omx/features"
          cp -f .omx/features/sec-fundamental-snapshot.csv "${tmp_state}/.omx/features/"
          cp -f .omx/reports/fundamental-macro-recent-gate-latest.* "${tmp_state}/.omx/reports/"
          cp -f .omx/reports/sec-fundamental-feature-snapshot-latest.* "${tmp_state}/.omx/reports/"
          cp -f .omx/reports/bls-macro-snapshot-latest.* "${tmp_state}/.omx/reports/"
          cp -f data/universe/us_dynamic_liquid_watchlist.txt "${tmp_state}/data/universe/"
          cp -f .omx/reports/us-dynamic-liquid-universe-latest.* "${tmp_state}/.omx/reports/"
          cp -f .omx/reports/market-universe-scan-latest.* "${tmp_state}/.omx/reports/"
          cp -f .omx/reports/adaptive-allocation-search-latest.* "${tmp_state}/.omx/reports/" || true
          cp -f .omx/reports/paper-observation-summary-latest.* "${tmp_state}/.omx/reports/"
          cp -f .omx/reports/paper-challenger-observation-summary-latest.* "${tmp_state}/.omx/reports/"
          cp -f .omx/reports/no-order-preview-latest.* "${tmp_state}/.omx/reports/"
          cp -f .omx/reports/paper-challenger-selection-latest.* "${tmp_state}/.omx/reports/"
          cp -f .omx/reports/operational-risk-gate-latest.* "${tmp_state}/.omx/reports/"
          cp -f .omx/reports/independent-price-replication-latest.* "${tmp_state}/.omx/reports/"
          cp -f .omx/reports/live-readiness-gate-latest.* "${tmp_state}/.omx/reports/"
          cp -f .omx/reports/broker-execution-preflight-latest.* "${tmp_state}/.omx/reports/"
          cp -f .omx/reports/no-order-gate-status-latest.* "${tmp_state}/.omx/reports/"
          cp -f .omx/reports/discord-paper-report-latest.* "${tmp_state}/.omx/reports/"
          git -C "${tmp_state}" init
          git -C "${tmp_state}" checkout -b "${STATE_BRANCH}"
          git -C "${tmp_state}" config user.name "github-actions[bot]"
          git -C "${tmp_state}" config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git -C "${tmp_state}" add -f reports .omx/reports .omx/features data/universe
          git -C "${tmp_state}" commit -m "Update paper observation state ${GITHUB_RUN_ID}"
          git -C "${tmp_state}" remote add origin \
            "https://x-access-token:${{ github.token }}@github.com/${GITHUB_REPOSITORY}.git"
          git -C "${tmp_state}" push --force origin "${STATE_BRANCH}:${STATE_BRANCH}"

      - name: Update paper observation status issue
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
          GITHUB_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -euo pipefail
          mode="success"
          if [[ "${{ job.status }}" != "success" ]]; then
            mode="failure"
          elif [[ "${{ steps.gate_status.outputs.mode }}" == "action-needed" ]]; then
            mode="action-needed"
          fi
          uv run python scripts/github_issue_report.py --mode "${mode}"

      - name: Send Discord paper report
        if: always()
        continue-on-error: true
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          GITHUB_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -euo pipefail
          uv run python scripts/discord_paper_report.py

# Workflow activation touch: keep scheduled paper observation indexed.
